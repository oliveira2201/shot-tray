services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3100}:3100"
    environment:
      PORT: 3100
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3100/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
